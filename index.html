<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Silben Puzzle</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui;}
body{background:#0e0e11;color:white;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;}
#game{width:100%;max-width:480px;text-align:center;transform:scale(1.2);}
h1{margin-bottom:10px;font-size:28px;}
#found{margin-bottom:10px;min-height:50px;display:flex;flex-wrap:wrap;justify-content:center;}
.wordFound{display:inline-block;margin:3px;padding:5px 10px;border-radius:6px;background:#1f1f2a;}
#grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(60px,1fr));gap:6px;margin:15px 0;justify-items:center;}
.tile{background:#1a1a23;border-radius:8px;padding:10px;cursor:pointer;font-weight:bold;transition:0.2s;user-select:none;text-align:center;}
.tile:hover{background:#2b2b38;}
.tile.hidden{visibility:hidden;}
#current{height:50px;display:flex;justify-content:center;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap;}
.currentPart{background:#2b2b38;padding:6px 8px;border-radius:6px;}
#controls{margin-top:10px;}
button{background:#3b5cff;border:none;color:white;padding:10px 15px;border-radius:8px;cursor:pointer;font-weight:bold;margin:0 5px;}
button:hover{background:#5d76ff;}
#win{position:absolute;top:0;left:0;width:100%;height:100%;background:#0e0e11;display:none;justify-content:center;align-items:center;flex-direction:column;text-align:center;}
</style>
</head>
<body>
<div id="game">
<h1>Silben Puzzle</h1>
<div id="found"></div>
<div id="grid"></div>
<div id="current"></div>
<div id="controls">
<button onclick="submitWord()">Submit</button>
<button onclick="clearWord()">Clear</button>
</div>
</div>
<div id="win">
<h1>Gewonnen!</h1>
<div id="winStats"></div>
<button onclick="startGame()">Neustart</button>
</div>

<script>
// Alle Silben sind echte Silben von 8 Wörtern
const WORDS=[
["Blu","me"],["Was","ser"],["Win","ter"],["Som","mer"],["Son","ne"],["Re","gen"],["Ster","ne"],["Mon","d"],
["Gar","ten"],["Fens","ter"],["Tisch"],["Lam","pe"],["Büch","er"],["Schrei","ben"],["Lie","bes","brief"],["Au","to","bahn"],
["Win","ter","fei","er"],["Sonn","en","schein"],["Re","gen","bo","gen"],["Kin","der","gar","ten"],["Schu","he"],["Taschen","lam","pe"],
["Haus","tür"],["Blü","ten","staub"],["Fahr","rad"],["Schlaf","zim","mer"],["Wol","ken","bruch"],["Meh","rwert","steu","er"]
];

let solutionWords=[];
let gridParts=[];
let current=[];
let tries=0;
let startTime=0;
const COLORS=["#ff6b6b","#ffd93d","#6bcB77","#4d96ff","#c77dff","#ff9f1c","#ff4c4c","#4cffd9"];

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function startGame(){
tries=0;
current=[];
document.getElementById("current").innerHTML="";
document.getElementById("found").innerHTML="";
document.getElementById("win").style.display="none";

solutionWords=shuffle([...WORDS]).slice(0,8);

gridParts=[];
solutionWords.forEach((w,i)=>{
w.forEach(s=>{
gridParts.push({text:s,word:w.join(""),color:COLORS[i],used:false});
});
});

gridParts=shuffle(gridParts);
renderGrid();
startTime=Date.now();
}

function renderGrid(){
const grid=document.getElementById("grid");
grid.innerHTML="";
gridParts.forEach((p,i)=>{
const d=document.createElement("div");
d.className="tile";
d.innerText=p.text;
if(p.used)d.classList.add("hidden");
d.onclick=()=>{
if(p.used) return;
current.push({index:i,text:p.text});
p.used=true;
renderCurrent();
renderGrid();
};
grid.appendChild(d);
});
}

function renderCurrent(){
const c=document.getElementById("current");
c.innerHTML="";
current.forEach(p=>{
const s=document.createElement("div");
s.className="currentPart";
s.innerText=p.text;
});
current.forEach(p=>{
const s=document.createElement("div");
s.className="currentPart";
s.innerText=p.text;
c.appendChild(s);
});
}

function clearWord(){
current.forEach(p=>{gridParts[p.index].used=false;});
current=[];
renderCurrent();
renderGrid();
}

function submitWord(){
tries++;
let word=current.map(x=>x.text).join("");
let match=solutionWords.find(w=>w.join("")===word);
if(match){
document.getElementById("found").innerHTML+=`<span class="wordFound">${word}</span>`;
current=[];
renderCurrent();
renderGrid();
solutionWords=solutionWords.filter(w=>w.join("")!==word);
if(solutionWords.length===0) winGame();
}else{
current.forEach(p=>gridParts[p.index].used=false);
current.forEach(p=>{
let tile=document.querySelectorAll(".tile")[p.index];
tile.style.background="#ff4c4c";
setTimeout(()=>{tile.style.background="#1a1a23";},500);
});
current=[];
renderCurrent();
renderGrid();
}
}

function winGame(){
let time=Math.floor((Date.now()-startTime)/1000);
let best=localStorage.getItem("silbenBest");
if(!best||time<best) localStorage.setItem("silbenBest",time);
best=localStorage.getItem("silbenBest");
document.getElementById("winStats").innerHTML=`Zeit: ${time}s<br>Versuche: ${tries}<br>Highscore: ${best}s`;
document.getElementById("win").style.display="flex";
}

startGame();
</script>
</body>
</html>
