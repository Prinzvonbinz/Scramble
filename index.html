<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Scrambled Sentence – Deutsch</title>
<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:sans-serif;
  background:#0f1115;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

#container{
  display:flex;
  flex-direction:column;
  align-items:center;
  max-width:600px;
  width:95vw;
}

h1{
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(5,1fr);
  gap:8px;
  width:100%;
  margin:10px 0;
}

.tile{
  background:#1c1f26;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  font-size:1.1em;
  cursor:pointer;
  transition:.2s;
  aspect-ratio:1/1;
}

.tile:hover{
  background:#2b303a;
  transform:scale(1.05);
}

#build{
  min-height:36px;
  font-size:22px;
  letter-spacing:2px;
  margin:10px 0;
}

button{
  background:#3a86ff;
  border:none;
  color:white;
  padding:10px 20px;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#5aa0ff;
}

#found{
  margin:10px 0;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.word{
  padding:6px 10px;
  border-radius:8px;
  margin:4px;
  display:inline-block;
  font-weight:bold;
}

.win{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:#000c;
  display:none;
  align-items:center;
  justify-content:center;
}

.winbox{
  background:#1c1f26;
  padding:30px;
  border-radius:12px;
  text-align:center;
}

.stats{
  margin-top:10px;
  font-size:14px;
  color:#aaa;
}
</style>
</head>
<body>
<div id="container">
<h1>Scrambled Sentence</h1>
<div id="found"></div>
<div class="grid" id="grid"></div>
<div id="build"></div>
<div>
  <button onclick="submitWord()">Submit</button>
  <button onclick="clearBuild()">Clear</button>
</div>
<div class="stats">
Zeit: <span id="time">0</span>s | Versuche: <span id="tries">0</span>
</div>
</div>

<div class="win" id="win">
  <div class="winbox">
    <h2>Gewonnen!</h2>
    <p id="result"></p>
    <button onclick="location.reload()">Nochmal spielen</button>
  </div>
</div>

<script>
// DEUTSCHE WÖRTER IN SILBEN
const WORDS=[
["SONN","EN","BLUM","E"],
["NOT","IZ","BUCH"],
["FUS","SBALL"],
["MOND","LICHT"],
["STER","NEN","FISCH"],
["SPIEL","PLATZ"],
["REGEN","BOGEN"],
["SCHMET","TER","LING"]
];

let selected=[],tiles=[],build=[],solved=[];
let tries=0,time=0,timer;

const colors=["#ff6b6b","#4ecdc4","#ffd93d","#6c8cff"];

function start(){
  shuffle(WORDS);
  selected=WORDS.slice(0,4);
  tiles=[];
  selected.forEach(w=>w.forEach(s=>tiles.push(s)));
  while(tiles.length<25)tiles.push("");
  shuffle(tiles);
  draw();
  timer=setInterval(()=>{
    time++;
    document.getElementById("time").innerText=time;
  },1000);
}

function draw(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  tiles.forEach((t,i)=>{
    const d=document.createElement("div");
    d.className="tile";
    d.innerText=t;
    if(!t)d.style.visibility="hidden";
    d.onclick=()=>clickTile(i);
    grid.appendChild(d);
  });
}

function clickTile(i){
  const t=tiles[i];
  if(!t)return;
  build.push({text:t,index:i});
  tiles[i]="";
  updateBuild();
  draw();
}

function updateBuild(){
  document.getElementById("build").innerText=build.map(b=>b.text).join("");
}

function clearBuild(){
  build.forEach(b=>tiles[b.index]=b.text);
  build=[];
  updateBuild();
  draw();
}

function submitWord(){
  tries++;
  document.getElementById("tries").innerText=tries;
  const word=build.map(b=>b.text).join("");
  let correctIndex=-1;
  selected.forEach((w,i)=>{
    if(w.join("")===word && !solved.includes(i)) correctIndex=i;
  });
  if(correctIndex>-1){
    solved.push(correctIndex);
    const span=document.createElement("span");
    span.className="word";
    span.style.background=colors[correctIndex];
    span.innerText=word;
    document.getElementById("found").appendChild(span);
    build=[];
    updateBuild();
    checkWin();
  } else {
    hintColors();
    clearBuild();
  }
}

function hintColors(){
  const grid=document.getElementById("grid").children;
  selected.forEach((w,i)=>{
    w.forEach(p=>{
      for(let g of grid){
        if(g.innerText===p){
          g.style.background=colors[i];
          setTimeout(()=>{g.style.background="#1c1f26"},600);
        }
      }
    });
  });
}

function checkWin(){
  if(solved.length===4){
    clearInterval(timer);
    const words=selected.map(w=>w.join("")).join(", ");
    document.getElementById("result").innerHTML=
      "Wörter: "+words+"<br>Zeit: "+time+"s<br>Versuche: "+tries;
    document.getElementById("win").style.display="flex";
  }
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

start();
</script>
</body>
</html>
