<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scrambled</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
background:#0f1115;
color:white;
font-family:system-ui;
display:flex;
justify-content:center;
align-items:center;
height:100dvh;
}

#game{
width:min(92vw,620px);
height:92dvh;
display:grid;
grid-template-rows:auto auto 1fr auto auto auto;
text-align:center;
gap:6px;
}

h1{
margin:0;
font-size:26px;
}

#found{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
min-height:28px;
}

.word{
padding:4px 10px;
border-radius:6px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
width:100%;
height:100%;
}

.tile{
background:#1c1f26;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:clamp(14px,2.6vw,22px);
cursor:pointer;
transition:.15s;
}

.tile:hover{
background:#2a303a;
transform:scale(1.05);
}

#build{
font-size:22px;
letter-spacing:2px;
min-height:30px;
}

button{
background:#3a86ff;
border:none;
color:white;
padding:8px 14px;
border-radius:8px;
font-size:15px;
cursor:pointer;
margin:2px;
}

button:hover{
background:#5aa0ff;
}

.stats{
font-size:13px;
color:#aaa;
}

.win{
position:fixed;
inset:0;
background:#000c;
display:none;
align-items:center;
justify-content:center;
}

.winbox{
background:#1c1f26;
padding:28px;
border-radius:14px;
text-align:center;
}

</style>
</head>

<body>

<div id="game">

<h1>Silben Puzzle</h1>

<div id="found"></div>

<div id="grid" class="grid"></div>

<div id="build"></div>

<div>
<button onclick="submitWord()">Submit</button>
<button onclick="clearBuild()">Clear</button>
</div>

<div class="stats">
Zeit: <span id="time">0</span>s |
Versuche: <span id="tries">0</span> |
Highscore: <span id="high">-</span>
</div>

</div>

<div class="win" id="win">
<div class="winbox">
<h2>Gewonnen!</h2>
<p id="result"></p>
<button onclick="location.reload()">Neustart</button>
</div>
</div>

<script>

const WORDS=[
["SON","NE"],
["BLU","ME"],
["MOND","LICHT"],
["STER","NE"],
["FUSS","BALL"],
["SPIEL","PLATZ"],
["RE","GEN","BO","GEN"],
["WAS","SER","FALL"],
["SCHMET","TER","LING"],
["DON","NER","WET","TER"],
["WIN","TER"],
["SOM","MER"],
["HIM","MEL"],
["MEER","WAS","SER"],
["GAR","TEN","HAUS"],
["KIR","SCH","BAUM"],
["KIN","DER","GAR","TEN"],
["FEU","ER","WEHR"],
["BAU","ERN","HOF"],
["WOL","KEN","KRAT","ZER"],
["SONN","EN","BRIL","LE"],
["HAND","SCHUH"],
["KAF","FEE","TAS","SE"],
["LEB","KU","CHEN"],
["SCHU","HE"]
]

const WORD_COUNT=6

const colors=[
"#ff6b6b",
"#4ecdc4",
"#ffd93d",
"#6c8cff",
"#ff9f43",
"#9b59b6"
]

let selected=[]
let tiles=[]
let build=[]
let solved=[]
let tries=0
let time=0
let timer

function start(){

shuffle(WORDS)

selected=WORDS.slice(0,WORD_COUNT)

tiles=[]
selected.forEach(w=>w.forEach(s=>tiles.push(s)))

while(tiles.length<25)tiles.push("")

shuffle(tiles)

draw()

timer=setInterval(()=>{
time++
document.getElementById("time").innerText=time
},1000)

loadHigh()

}

function draw(){

const grid=document.getElementById("grid")
grid.innerHTML=""

tiles.forEach((t,i)=>{

const d=document.createElement("div")
d.className="tile"
d.innerText=t

if(!t)d.style.visibility="hidden"

d.onclick=()=>clickTile(i)

grid.appendChild(d)

})

}

function clickTile(i){

const t=tiles[i]
if(!t)return

build.push({text:t,index:i})
tiles[i]=""

updateBuild()
draw()

}

function updateBuild(){
document.getElementById("build").innerText=
build.map(b=>b.text).join("")
}

function clearBuild(){

build.forEach(b=>{
tiles[b.index]=b.text
})

build=[]
updateBuild()
draw()

}

function submitWord(){

tries++
document.getElementById("tries").innerText=tries

const word=build.map(b=>b.text).join("")

let correctIndex=-1

selected.forEach((w,i)=>{
if(w.join("")===word && !solved.includes(i)){
correctIndex=i
}
})

if(correctIndex>-1){

solved.push(correctIndex)

const span=document.createElement("span")
span.className="word"
span.style.background=colors[correctIndex]
span.innerText=word

document.getElementById("found").appendChild(span)

build=[]
updateBuild()

checkWin()

}else{

hintColors()
clearBuild()

}

}

function hintColors(){

const grid=document.getElementById("grid").children

selected.forEach((w,i)=>{

w.forEach(p=>{

for(let g of grid){

if(g.innerText===p){

g.style.background=colors[i]

setTimeout(()=>{
g.style.background="#1c1f26"
},600)

}

}

})

})

}

function checkWin(){

if(solved.length===WORD_COUNT){

clearInterval(timer)

const words=selected.map(w=>w.join("")).join(", ")

saveHigh()

document.getElementById("result").innerHTML=
"Wörter: "+words+
"<br>Zeit: "+time+"s"+
"<br>Versuche: "+tries

document.getElementById("win").style.display="flex"

}

}

function saveHigh(){

let best=localStorage.getItem("silbenHigh")

if(!best || time<best){
localStorage.setItem("silbenHigh",time)
}

loadHigh()

}

function loadHigh(){

let best=localStorage.getItem("silbenHigh")
document.getElementById("high").innerText=best?best+"s":"-"

}

function shuffle(a){

for(let i=a.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1))
[a[i],a[j]]=[a[j],a[i]]

}

}

start()

</script>

</body>
</html>
